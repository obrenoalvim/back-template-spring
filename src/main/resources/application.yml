spring:
  application:
    name: back-template-spring
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

logging:
  level:
    root: ${LOG_LEVEL:info}

app:
  jwt:
    secret: ${JWT_SECRET:}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:30}
  mail:
    host: ${MAIL_HOST:}
    from: ${MAIL_FROM:no-reply@example.com}
